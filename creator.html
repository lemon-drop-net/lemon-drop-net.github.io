<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATORS ARCHIVE | LEMON DROP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #000; color: #fff; }
        .text-lemon { color: #fef08a; }
        .bg-lemon { background-color: #fef08a; }
        .border-lemon { border-color: #fef08a; }
        .creator-card { transition: all 0.3s ease; }
        .creator-card:hover { transform: translateY(-5px); border-color: #fef08a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">
    <header class="p-4 border-b border-zinc-800 sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="index.html" class="text-sm font-black text-lemon italic">← BACK</a>
            <h1 class="text-lg font-black tracking-tighter">LEMON DROP <span class="text-lemon">CREATORS</span></h1>
            <div class="w-8"></div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto p-6 space-y-6">
        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <button class="bg-lemon text-black px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap">ALL</button>
            <button class="bg-zinc-800 text-white px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap hover:bg-zinc-700">衣装制作</button>
            <button class="bg-zinc-800 text-white px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap hover:bg-zinc-700">撮影/レタッチ</button>
            <button class="bg-zinc-800 text-white px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap hover:bg-zinc-700">楽曲制作</button>
            <button class="bg-zinc-800 text-white px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap hover:bg-zinc-700">デザイン</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <select class="bg-zinc-900 border border-zinc-700 text-xs p-3 rounded-lg text-gray-400">
                <option>活動拠点：全国</option>
                <option>関東（相模原近郊）</option>
                <option>オンラインのみ</option>
            </select>
            <select class="bg-zinc-900 border border-zinc-700 text-xs p-3 rounded-lg text-gray-400">
                <option>ソート：おすすめ順</option>
                <option>評価の高い順</option>
                <option>新着順</option>
            </select>
            <input type="text" placeholder="キーワード検索..." class="col-span-2 bg-zinc-900 border border-zinc-700 text-xs p-3 rounded-lg">
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden creator-card relative">
                <div class="absolute top-2 right-2 bg-lemon text-black text-[10px] font-black px-2 py-1 rounded shadow-lg z-10 italic">LD認証</div>
                <img src="photo-luna.jpg" class="w-full aspect-square object-cover">
                <div class="p-3">
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="font-black text-sm">LUNA</h3>
                        <span class="text-lemon text-[10px]">★ 4.9</span>
                    </div>
                    <p class="text-[10px] text-gray-400 mb-3 leading-tight">衣装制作・現場リメイク</p>
                    <div class="flex flex-wrap gap-1">
                        <span class="text-[8px] border border-zinc-700 px-1 text-gray-500">相模原</span>
                        <span class="text-[8px] border border-zinc-700 px-1 text-gray-500">地雷系</span>
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden creator-card relative">
                <div class="absolute top-2 right-2 bg-lemon text-black text-[10px] font-black px-2 py-1 rounded shadow-lg z-10 italic">LD認証</div>
                <img src="photo-kento.jpg" class="w-full aspect-square object-cover">
                <div class="p-3">
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="font-black text-sm">KENTO AI</h3>
                        <span class="text-lemon text-[10px]">★ 5.0</span>
                    </div>
                    <p class="text-[10px] text-gray-400 mb-3 leading-tight">楽曲制作・エンジニア</p>
                    <div class="flex flex-wrap gap-1">
                        <span class="text-[8px] border border-zinc-700 px-1 text-gray-500">オンライン</span>
                        <span class="text-[8px] border border-zinc-700 px-1 text-gray-500">サイバー</span>
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden creator-card relative">
                <div class="absolute top-2 right-2 bg-lemon text-black text-[10px] font-black px-2 py-1 rounded shadow-lg z-10 italic">LD認証</div>
                <img src="photo-momo.jpg" class="w-full aspect-square object-cover">
                <div class="p-3">
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="font-black text-sm text-white">MOMO</h3>
                        <span class="text-lemon text-[10px]">★ 4.8</span>
                    </div>
                    <p class="text-[10px] text-gray-400 mb-3 leading-tight">顔面顧問・神レタッチ</p>
                    <div class="flex flex-wrap gap-1">
                        <span class="text-[8px] border border-zinc-700 px-1 text-gray-500">全国</span>
                        <span class="text-[8px] border border-zinc-700 px-1 text-gray-500">レタッチ</span>
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900 border-2 border-dashed border-zinc-800 rounded-xl overflow-hidden creator-card flex flex-col items-center justify-center p-6 text-zinc-600 hover:text-lemon hover:border-lemon">
                <div class="text-3xl mb-1">+</div>
                <p class="text-[10px] font-black">BE A MEMBER</p>
            </div>

        </div>
    </main>
</body>
</html>
