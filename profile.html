<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サキ | おとなレモン公式</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Noto Sans JP', sans-serif; background: #fff; }</style>
</head>
<body class="bg-gray-50">

    <main class="max-w-4xl mx-auto pb-20">
        <div class="relative h-64 bg-zinc-900 overflow-hidden">
            <img src="https://picsum.photos/seed/saki-cover/1200/400" class="w-full h-full object-cover opacity-50 blur-sm">
            <div class="absolute -bottom-12 left-8 flex items-end gap-6">
                <div class="w-32 h-32 rounded-full border-4 border-white overflow-hidden shadow-xl bg-white">
                    <img src="https://picsum.photos/seed/saki/400/400" class="w-full h-full object-cover">
                </div>
                <div class="mb-14">
                    <h2 class="text-2xl font-black text-white drop-shadow-md">サキ <span class="text-xs font-normal opacity-80 italic">@saki_lemon</span></h2>
                    <p class="text-[10px] text-yellow-300 font-bold tracking-widest uppercase">地下アイドル / 王道系</p>
                </div>
            </div>
        </div>

        <div class="px-8 mt-16 grid md:grid-cols-3 gap-8">
            <div class="md:col-span-2 space-y-6">
                <p class="text-sm leading-relaxed text-gray-600 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    現役地下アイドルのサキです！「おとなレモン」では、ライブでは見せられない「毒のある甘さ」をテーマに、α7IVで撮り下ろした高画質グラビアや限定動画をお届けします。応援よろしくお願いします🍋
                </p>
                
                <h3 class="font-black text-lg italic border-l-4 border-yellow-400 pl-3">CONTENTS</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="aspect-video bg-gray-200 rounded-xl overflow-hidden relative group cursor-pointer">
                        <img src="https://picsum.photos/seed/saki1/400/225" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-100 group-hover:opacity-0 transition">
                            <span class="text-white text-[10px] font-bold">会員限定</span>
                        </div>
                    </div>
                    </div>
            </div>

            <div class="space-y-4">
                <div class="bg-white p-6 rounded-3xl border-2 border-yellow-400 shadow-xl">
                    <span class="text-[8px] font-black bg-yellow-400 px-2 py-1 rounded-md">LIMITED PLAN</span>
                    <p class="mt-2 text-xl font-black">サキ限定プラン</p>
                    <p class="text-2xl font-black my-4">¥1,500 <span class="text-xs font-normal text-gray-400">/ 月</span></p>
                    <button class="w-full bg-black text-white py-3 rounded-full font-black text-xs hover:scale-105 transition">入会してすべて見る</button>
                    <ul class="mt-4 text-[10px] text-gray-500 space-y-2">
                        <li>・限定撮り下ろし写真（週1更新）</li>
                        <li>・オフショット動画</li>
                        <li>・会員限定先行物販</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
