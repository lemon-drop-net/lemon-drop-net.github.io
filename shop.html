<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Lemon drop</title>
    <link rel="stylesheet" href="shop-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="site-header">
    <div class="container">
        <h1 class="logo">Lemon drop</h1>
        <nav class="nav">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#" class="active">Shop</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <section class="shop-hero">
        <div class="container">
            <h2>Online Shop</h2>
            <p>毎日に、爽やかなレモンの彩りを。</p>
        </div>
    </section>

    <section class="product-grid container">
        <article class="product-card">
            <div class="product-image">
                <img src="https://via.placeholder.com/400x400?text=Product+Image" alt="商品名">
                <span class="badge">New</span>
            </div>
            <div class="product-info">
                <h3>レモンドロップ・オリジナル</h3>
                <p class="price">¥1,200 <span>(tax in)</span></p>
                <button class="add-to-cart">詳細を見る</button>
            </div>
        </article>

        <article class="product-card">
            <div class="product-image">
                <img src="https://via.placeholder.com/400x400?text=Product+Image" alt="商品名">
            </div>
            <div class="product-info">
                <h3>季節のセレクトセット</h3>
                <p class="price">¥3,500 <span>(tax in)</span></p>
                <button class="add-to-cart">詳細を見る</button>
            </div>
        </article>

        <article class="product-card">
            <div class="product-image">
                <img src="https://via.placeholder.com/400x400?text=Product+Image" alt="商品名">
                <span class="badge sale">Sale</span>
            </div>
            <div class="product-info">
                <h3>レモンピール・アロマ</h3>
                <p class="price">¥850 <span>(tax in)</span></p>
                <button class="add-to-cart">詳細を見る</button>
            </div>
        </article>

        <article class="product-card">
            <div class="product-image">
                <img src="https://via.placeholder.com/400x400?text=Product+Image" alt="商品名">
            </div>
            <div class="product-info">
                <h3>ギフトラッピング</h3>
                <p class="price">¥300 <span>(tax in)</span></p>
                <button class="add-to-cart">詳細を見る</button>
            </div>
        </article>
    </section>
</main>

<footer class="site-footer">
    <div class="container">
        <p>&copy; 2026 Lemon drop All Rights Reserved.</p>
    </div>
</footer>

</body>
</html>
